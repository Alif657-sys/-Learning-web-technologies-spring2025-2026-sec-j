<!DOCTYPE html>
<html>
<head>
<title>Blood Group</title>
</head>

<body>

<h2>Blood Group</h2>

<form onsubmit="return validBlood()">

<select id="blood">

<option value="">Select</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>

</select>

<br><br>

<input type="submit" value="Submit">

</form>

<script>

function validBlood(){

let blood=document.getElementById("blood").value;

if(blood==="")
{
alert("select a blood group");
return false;
}

return true;

}

</script>

</body>
</html>
